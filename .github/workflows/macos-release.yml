name: macOS Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS package
        run: pnpm build:mac

      - name: List dist files
        run: |
          ls -la dist
          find dist -maxdepth 1 -type f | sort

      - name: Validate release assets
        run: |
          test -n "$(find dist -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lume-gui-release-${{ github.ref_name || github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "dist/Lume GUI-"*-arm64.dmg \
            "dist/Lume GUI-"*-arm64.zip \
            "dist/Lume GUI-"*.dmg.blockmap \
            "dist/Lume GUI-"*.zip.blockmap \
            dist/latest-mac.yml \
            --clobber
